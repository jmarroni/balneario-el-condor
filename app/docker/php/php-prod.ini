; OPcache tuning para prod
opcache.enable=1
opcache.enable_cli=0
opcache.memory_consumption=192
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=20000
opcache.validate_timestamps=0    ; en prod no chequear mtime, solo invalidar al deploy
; opcache.preload deshabilitado: requiere generar storage/framework/preload.php
; opcache.preload=/var/www/html/storage/framework/preload.php
; opcache.preload_user=www-data
opcache.jit_buffer_size=64M
opcache.jit=tracing

; Limits razonables
memory_limit=256M
upload_max_filesize=20M
post_max_size=24M
max_execution_time=60
max_input_vars=3000

; Logging
log_errors=On
error_log=/dev/stderr
display_errors=Off
display_startup_errors=Off

; Sesiones (Laravel maneja sus sesiones, esto es default PHP)
session.cookie_secure=On
session.cookie_httponly=On
session.cookie_samesite=Lax
