server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;
    charset utf-8;

    # Logs con buffer para performance
    access_log /var/log/nginx/access.log combined buffer=16k flush=10s;
    error_log /var/log/nginx/error.log warn;

    # Security headers globales
    include /etc/nginx/snippets/security-headers.conf;

    # Gzip
    include /etc/nginx/snippets/cache.conf;

    # Healthcheck Laravel /up
    location = /up {
        try_files $uri /index.php?$query_string;
        access_log off;
    }

    # Robots y sitemap servidos rápido
    location = /robots.txt {
        try_files $uri /index.php?$query_string;
        access_log off;
    }
    location = /sitemap.xml {
        try_files $uri /index.php?$query_string;
    }

    # Assets compilados (Vite build) — immutable cache 1 año
    location ^~ /build/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Storage público (legacy media + uploads) — 30 días
    location ^~ /storage/ {
        access_log off;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # Documentación Scramble — protección real en middleware Laravel
    location ^~ /docs/ {
        try_files $uri $uri/ /index.php?$query_string;
        access_log off;
    }

    # Imágenes / fonts comunes — 30 días
    location ~* \.(jpg|jpeg|png|gif|webp|svg|ico|woff2?|ttf|otf)$ {
        access_log off;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # Front controller
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        # Traefik termina TLS — propagamos a Laravel para que genere URLs https
        fastcgi_param HTTPS on;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 60s;
        client_max_body_size 24m;
    }

    # Bloquear archivos sensibles (dotfiles excepto .well-known)
    location ~ /\.(?!well-known) {
        deny all;
    }
    location ~ /\.env {
        deny all;
    }
}
