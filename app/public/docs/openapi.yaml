openapi: 3.0.3
info:
  title: 'Balneario El Condor API Documentation'
  description: 'API REST v1 del sitio de Balneario El Cóndor. Provee acceso a novedades, eventos, alojamientos, gastronomía, alquileres, mareas, clima y formularios públicos.'
  version: 1.0.0
servers:
  -
    url: 'http://localhost:18081'
tags:
  -
    name: Alojamientos
    description: "\nDirectorio de alojamientos turísticos: hoteles, hosterías, departamentos y campings."
  -
    name: Clima
    description: "\nInformación meteorológica actual del Balneario (servida desde caché)."
  -
    name: Endpoints
    description: ''
  -
    name: 'Endpoints públicos'
    description: "\nEndpoints públicos de la API (sin auth).\nPensado para apps externas que necesiten enviar formularios al sitio."
  -
    name: Eventos
    description: "\nGestión de eventos y agenda cultural del Balneario."
  -
    name: Gastronomía
    description: "\nDirectorio de restaurantes, bares y locales gastronómicos."
  -
    name: Mareas
    description: "\nInformación de mareas (alta y baja) para la zona del Balneario."
  -
    name: Novedades
    description: "\nGestión de noticias y novedades publicadas en el sitio."
components:
  securitySchemes:
    default:
      type: http
      scheme: bearer
      description: 'You can retrieve your token by visiting your dashboard and clicking <b>Generate API token</b>.'
security:
  -
    default: []
paths:
  /api/v1/lodgings:
    get:
      summary: 'Listar alojamientos'
      operationId: listarAlojamientos
      description: ''
      parameters:
        -
          in: query
          name: q
          description: 'Búsqueda parcial por nombre.'
          example: hostería
          required: false
          schema:
            type: string
            description: 'Búsqueda parcial por nombre.'
            example: hostería
        -
          in: query
          name: type
          description: 'Filtrar por tipo: hotel | hosteria | departamento | camping.'
          example: hotel
          required: false
          schema:
            type: string
            description: 'Filtrar por tipo: hotel | hosteria | departamento | camping.'
            example: hotel
        -
          in: query
          name: per_page
          description: 'Cantidad por página.'
          example: 20
          required: false
          schema:
            type: integer
            description: 'Cantidad por página.'
            example: 20
      responses:
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthenticated.
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
      tags:
        - Alojamientos
  '/api/v1/lodgings/{slug}':
    get:
      summary: 'Mostrar alojamiento'
      operationId: mostrarAlojamiento
      description: ''
      parameters: []
      responses:
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthenticated.
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
      tags:
        - Alojamientos
    parameters:
      -
        in: path
        name: slug
        description: 'The slug of the lodging.'
        example: 16
        required: true
        schema:
          type: integer
      -
        in: path
        name: lodging
        description: 'Slug del alojamiento.'
        example: hosteria-del-mar
        required: true
        schema:
          type: string
  /api/v1/weather:
    get:
      summary: 'Clima actual'
