                description:
                  type: string
                  description: ''
                  example: 'Eius et animi quos velit et.'
                  nullable: true
                location:
                  type: string
                  description: 'Must not be greater than 500 characters.'
                  example: v
                  nullable: true
                starts_at:
                  type: string
                  description: 'Must be a valid date.'
                  example: '2026-04-25T00:46:41'
                  nullable: true
                ends_at:
                  type: string
                  description: 'Must be a valid date. Must be a date after or equal to <code>starts_at</code>.'
                  example: '2052-05-18'
                  nullable: true
                all_day:
                  type: boolean
                  description: ''
                  example: false
                  nullable: true
                featured:
                  type: boolean
                  description: ''
                  example: false
                  nullable: true
                accepts_registrations:
                  type: boolean
                  description: ''
                  example: false
