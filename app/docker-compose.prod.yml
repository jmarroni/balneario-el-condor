services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: prod
    image: balneario:${APP_VERSION:-latest}
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    volumes: !override
      # Solo storage (uploads + logs persistentes) + public para nginx
      # Sin bind mount del código — viene en la imagen
      - app_storage:/var/www/html/storage/app
      - app_logs:/var/www/html/storage/logs
      - app_public:/var/www/html/public

  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: prod
    image: balneario:${APP_VERSION:-latest}
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes: !override
      - app_storage:/var/www/html/storage/app
      - app_logs:/var/www/html/storage/logs
    depends_on:
      app:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_started

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: prod
    image: balneario:${APP_VERSION:-latest}
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    command: php artisan schedule:work
    volumes: !override
      - app_storage:/var/www/html/storage/app
      - app_logs:/var/www/html/storage/logs
    depends_on:
      app:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_started

  nginx:
    restart: unless-stopped
    # Sin puerto host expuesto — Traefik (u otro reverse proxy) hace el routing por red interna.
    # Si se despliega sin Traefik, descomentar `ports` con el puerto deseado.
    ports: !override []
    volumes: !override
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/snippets:/etc/nginx/snippets:ro
      - app_storage:/var/www/html/storage/app:ro
      - app_public:/var/www/html/public:ro
    labels:
      # Traefik (opcional — habilitar cuando se use Traefik como reverse proxy)
      - "traefik.enable=true"
      - "traefik.http.routers.balneario.rule=Host(`elcondor.gob.ar`)"
      - "traefik.http.routers.balneario.entrypoints=websecure"
      - "traefik.http.routers.balneario.tls.certresolver=letsencrypt"
      - "traefik.http.services.balneario.loadbalancer.server.port=80"

  db:
    restart: unless-stopped
    env_file:
      - .env.production
    # En prod NO publicar el puerto al host (solo intra-network)
    ports: !override []

  redis:
    restart: unless-stopped
    ports: !override []
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}

volumes:
  app_storage:
  app_logs:
  app_public:
